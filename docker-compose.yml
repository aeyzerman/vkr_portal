services:

    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
        container_name: vkr_app
        working_dir: /var/www
        volumes:
            - .:/var/www
        networks:
            - vkr
        depends_on:
            - db

    nginx:
        image: nginx:alpine
        container_name: vkr_nginx
        ports:
            - "8080:80"
        volumes:
            - .:/var/www
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
        networks:
            - vkr
        depends_on:
            - app

    db:
        image: mysql:8.0
        container_name: vkr_db
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: vkr
            MYSQL_USER: vkr
            MYSQL_PASSWORD: vkr
        ports:
            - "3307:3306"
        volumes:
            - db_data:/var/lib/mysql
            - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
            - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
        networks:
            - vkr

volumes:
    db_data:

networks:
    vkr:
